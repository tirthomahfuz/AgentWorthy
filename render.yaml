# Render blueprint — deploy API + worker + Postgres + Redis
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: agentworthy-api
    runtime: docker
    dockerfilePath: apps/api/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: agentworthy-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: agentworthy-redis
          type: redis
          property: connectionString
      - key: API_SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: PORT
        value: "8000"

  - type: worker
    name: agentworthy-worker
    runtime: docker
    dockerfilePath: apps/worker/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: agentworthy-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: agentworthy-redis
          type: redis
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false

  - type: redis
    name: agentworthy-redis
    plan: free
    maxmemoryPolicy: noeviction
    ipAllowList: []

databases:
  - name: agentworthy-db
    plan: free
    databaseName: agentworthy
    user: agentworthy
